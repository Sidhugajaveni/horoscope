<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020205; 
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(168, 85, 247, 0.4);
            transform: translateY(-6px);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.3); }
        }

        .searching-glow {
            animation: pulse-glow 1.5s ease-in-out infinite;
        }

        select { appearance: none; background-image: none !important; }
        .btn-active:active { transform: scale(0.96); }

        .reveal-matter {
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

        const { useState, useEffect, useRef } = React;

        // Updated API Key
        const apiKey = "AIzaSyCoYiF43wBOKeoASNY2TLe54jVk-qBXeZw";

            Share2: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            Lightbulb: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .5 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/></svg>,

            ArrowLeft: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            RefreshCw: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            Loader: () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="animate-spin text-purple-500"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        };

        const ZODIAC_SIGNS = [
            { name: 'Aries', date: 'Mar 21 - Apr 19', element: 'Fire', color: 'from-orange-500 to-red-600' },
            { name: 'Taurus', date: 'Apr 20 - May 20', element: 'Earth', color: 'from-emerald-500 to-green-700' },
            { name: 'Gemini', date: 'May 21 - Jun 20', element: 'Air', color: 'from-yellow-400 to-amber-500' },
            { name: 'Cancer', date: 'Jun 21 - Jul 22', element: 'Water', color: 'from-blue-400 to-indigo-500' },
            { name: 'Leo', date: 'Jul 23 - Aug 22', element: 'Fire', color: 'from-yellow-500 to-orange-600' },
            { name: 'Virgo', date: 'Aug 23 - Sep 22', element: 'Earth', color: 'from-stone-500 to-lime-700' },
            { name: 'Libra', date: 'Sep 23 - Oct 22', element: 'Air', color: 'from-pink-400 to-rose-500' },
            { name: 'Scorpio', date: 'Oct 23 - Nov 21', element: 'Water', color: 'from-purple-600 to-indigo-900' },
            { name: 'Sagittarius', date: 'Nov 22 - Dec 21', element: 'Fire', color: 'from-blue-600 to-purple-600' },
            { name: 'Capricorn', date: 'Dec 22 - Jan 19', element: 'Earth', color: 'from-gray-600 to-slate-900' },
            { name: 'Aquarius', date: 'Jan 20 - Feb 18', element: 'Air', color: 'from-cyan-400 to-blue-500' },
            { name: 'Pisces', date: 'Feb 19 - Mar 20', element: 'Water', color: 'from-teal-400 to-blue-600' },
        ];

        function SpaceBackground() {
            const mountRef = useRef(null);
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);
                
                const starGeometry = new THREE.BufferGeometry();
                const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.8 });
                const starVertices = [];
                for (let i = 0; i < 10000; i++) {
                    starVertices.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, -Math.random() * 2000);
                }
                starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                const stars = new THREE.Points(starGeometry, starMaterial);
                scene.add(stars);
                
                camera.position.z = 1;
                let mouseX = 0, mouseY = 0;
                
                const handleMove = (e) => {
                    mouseX = (e.clientX - window.innerWidth / 2) / 100;
                    mouseY = (e.clientY - window.innerHeight / 2) / 100;
                };
                
                window.addEventListener('mousemove', handleMove);
                
                const animate = () => {
                    requestAnimationFrame(animate);
                    stars.rotation.y += 0.0003;
                    camera.position.x += (mouseX - camera.position.x) * 0.05;
                    camera.position.y += (-mouseY - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                    renderer.render(scene, camera);
                };
                animate();
                
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('resize', handleResize);
                    if (mountRef.current) mountRef.current.innerHTML = "";
                };
            }, []);
            return <div ref={mountRef} className="fixed inset-0 z-0 pointer-events-none" />;
        }

        function App() {
            const [view, setView] = useState('home');
            const [selectedSign, setSelectedSign] = useState(null);
            const [secondSign, setSecondSign] = useState(null);
            const [userName, setUserName] = useState("");
            const [partnerName, setPartnerName] = useState("");
            const [reading, setReading] = useState("");
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [cache, setCache] = useState({});

            const fetchCelestialData = async (prompt, systemPrompt, cacheKey) => {
                if (cache[cacheKey]) { 
                    setReading(cache[cacheKey]); 
                    setErrorMsg("");
                    return; 
                }
                
                setLoading(true); 
                setReading("");
                setErrorMsg("");
                
                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        // Updated to stable Gemini 2.5 Flash endpoint
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                        
                        const response = await fetch(url, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                contents: [{ 
                                    parts: [{ text: prompt }] 
                                }],
                                systemInstruction: {
                                    parts: [{ text: `Act as a master Vedic Seer. Character context: ${systemPrompt}. Your purpose is to provide mystical Jathakam readings based on name energy or signs. Stay 100% in character. Never mention AI. Use creative, encouraging, and mystical language. Write exactly two paragraphs in simple, clear English.` }]
                                }
                            })
                        });
                        
                        if (!response.ok) {
                            if (retries > 0) {
                                await new Promise(resolve => setTimeout(resolve, delay));
                                return fetchWithRetry(retries - 1, delay * 2);
                            }
                            throw new Error(`Cosmic signal lost (${response.status})`);
                        }

                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

                        if (text) {
                            setCache(prev => ({ ...prev, [cacheKey]: text })); 
                            setReading(text); 
                        } else {
                            throw new Error("The stars remain silent today.");
                        }
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        setErrorMsg("Could not reach the cosmos. Please check your connection and try again.");
                    }
                };

                await fetchWithRetry();
                setLoading(false); 
            };

            const resetState = (newView) => { 
                setView(newView); 
                setSelectedSign(null); 
                setSecondSign(null); 
                setReading(""); 
                setErrorMsg("");
                setUserName(""); 
                setPartnerName(""); 
                setLoading(false); 
            };

            const handleHoroscope = (sign) => {
                setSelectedSign(sign);
                setView('horoscope_detail');
                fetchCelestialData(
                    `Provide a detailed Jathakam horoscope for ${sign.name} (${sign.element} sign) for today.`, 
                    "Spiritual Jathakam guide. Focus on path and energy.", 
                    `horo-${sign.name}-${new Date().toLocaleDateString()}`
                );
            };

            const handleCompatibility = () => {
                if (!selectedSign || !secondSign) return;
                fetchCelestialData(
                    `Analyze the divine bond match between the signs ${selectedSign.name} and ${secondSign.name}.`, 
                    "Soulmate bond expert. Focus on elemental resonance.", 
                    `comp-${selectedSign?.name}-${secondSign?.name}`
                );
            };

            const handleNameMatch = () => {
                if (!userName || !partnerName) return;
                fetchCelestialData(
                    `Based on real name resonance, explain the mystical connection and bond between '${userName}' and '${partnerName}'.`, 
                    "Divine connection specialist. Focus on name vibrations.", 
                    `match-${userName}-${partnerName}`
                );
            };

            const handleAdvice = () => {
                fetchCelestialData(
                    "Give mystical daily guidance for a seeker's path.", 
                    "Universal life coach. Provide inspiring advice.", 
                    `advice-${new Date().toLocaleDateString()}`
                );
            };

            const handleNameAstrology = () => {
                if (!userName) return;
                fetchCelestialData(
                    `Provide a deep mystical destiny reading (Jathakam) for the name '${userName}'.`, 
                    "Vedic Prophet. Reveal the hidden path within the name.", 
                    `dest-${userName}`
                );
            };

            const LoadingOverlay = () => (
                <div className="mt-12 flex flex-col items-center justify-center space-y-6 searching-glow animate-in fade-in zoom-in-95 duration-500 px-4">
                    <Icons.Loader />
                    <p className="text-lg md:text-xl font-bold text-purple-400 uppercase tracking-[0.2em] md:tracking-[0.3em] text-center">Consulting the Stars...</p>
                    <p className="text-slate-500 text-xs md:text-sm italic text-center text-balance px-10">Searching the celestial brain for your path</p>
                </div>
            );

            return (
                <div className="min-h-screen relative overflow-x-hidden bg-[#020205]">
                    <SpaceBackground />
                    
                    <div className="fixed inset-0 pointer-events-none opacity-40 z-0">

                        <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_80%_80%,_rgba(59,130,246,0.15),transparent_50%)]" />
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_rgba(236,72,153,0.05),transparent_60%)]" />

                        <button onClick={() => resetState('home')} className="flex items-center gap-2 active:scale-95 transition-transform group flex-shrink-0">

                                <Icons.Sparkles />
                            </div>
                            <span className="text-base md:text-xl font-black hidden sm:block tracking-tighter uppercase glow-text">Zodiac Echoes</span>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar scroll-smooth px-1 h-full items-center">

                            <NavItem icon={<Icons.Share2/>} label="Vibe Check" active={view === 'name_match'} onClick={() => resetState('name_match')} />
                            <NavItem icon={<Icons.Lightbulb/>} label="Advice" active={view === 'advice'} onClick={() => resetState('advice')} />
                            <NavItem icon={<Icons.Type/>} label="Future" active={view === 'name_astrology'} onClick={() => resetState('name_astrology')} />
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8 md:py-12 relative z-10">
                        {view === 'home' && (
                            <div className="animate-in fade-in duration-1000 slide-in-from-bottom-4">
                                <header className="text-center mb-8 md:mb-16 px-4">

                                            <h3 className="text-base md:text-xl font-black tracking-tight">{sign.name}</h3>
                                            <p className="text-[8px] md:text-[10px] uppercase text-slate-500 font-black mt-1 tracking-widest">{sign.date}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'horoscope_detail' && (
                            <div className="max-w-3xl mx-auto animate-in fade-in zoom-in-95 duration-500">
                                <button onClick={() => resetState('home')} className="mb-6 flex items-center gap-2 bg-white/5 py-2 px-4 rounded-full font-black border border-white/10 text-[10px] uppercase tracking-widest btn-active"><Icons.ArrowLeft /> Back to Galaxy</button>
                                <div className="bg-black/80 p-8 md:p-16 rounded-[2.5rem] md:rounded-[4rem] border border-white/10 backdrop-blur-3xl shadow-3xl relative overflow-hidden">
                                    <div className={`absolute top-0 right-0 w-48 h-48 md:w-64 md:h-64 bg-gradient-to-br ${selectedSign?.color} opacity-20 blur-[100px]`} />
                                    <div className="relative z-10">
                                        <div className="flex flex-col sm:flex-row justify-between items-center gap-6 mb-10 md:mb-16">
                                            <div className="text-center sm:text-left">
                                                <h2 className="text-4xl md:text-6xl font-black tracking-tighter">{selectedSign?.name}</h2>
                                                <p className="text-slate-400 uppercase tracking-widest font-black text-[10px] mt-2">{selectedSign?.date}</p>
                                            </div>
                                            <div className={`w-16 h-16 md:w-24 md:h-24 rounded-2xl bg-gradient-to-br ${selectedSign?.color} flex items-center justify-center shadow-2xl rotate-6 scale-110`}><Icons.Star size={32} /></div>

                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'compatibility' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <h1 className="text-2xl md:text-5xl font-black text-center mb-4 glow-text leading-tight">Sign Bond</h1>
                                <p className="text-center text-slate-400 font-bold uppercase text-[10px] mb-10 tracking-widest px-4">Elemental resonance matching for partners</p>
                                <div className="grid md:grid-cols-2 gap-6 mb-10">
                                    <SelectSign label="First Soul" value={selectedSign?.name} onChange={n => setSelectedSign(ZODIAC_SIGNS.find(s => s.name === n))} />
                                    <SelectSign label="Second Soul" value={secondSign?.name} onChange={n => setSecondSign(ZODIAC_SIGNS.find(s => s.name === n))} />
                                </div>
                                <button onClick={handleCompatibility} disabled={loading || !selectedSign || !secondSign} className={`w-full py-5 md:py-7 bg-gradient-to-r from-indigo-600 to-purple-700 rounded-[1.2rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all shadow-2xl active:scale-95 ${loading ? 'searching-glow' : ''}`}>
                                    {loading ? 'Consulting the Universe...' : 'Reveal Celestial Match'}
                                </button>
                                {loading && <LoadingOverlay />}
                                {errorMsg && <div className="mt-8 text-red-400 text-center p-6 glass-card rounded-2xl">{errorMsg}</div>}
                                {reading && !loading && <ResultCard title="Divine Alignment" text={reading} onRefresh={handleCompatibility} />}
                            </div>
                        )}

                        {view === 'name_match' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <h1 className="text-2xl md:text-5xl font-black text-center mb-4 glow-text leading-tight">Vibe Check</h1>
                                <p className="text-center text-slate-400 font-bold uppercase text-[10px] mb-10 tracking-widest px-4 text-balance">Checking the resonance between two souls</p>
                                <div className="grid md:grid-cols-2 gap-4 mb-6">
                                    <input type="text" placeholder="First Name" className="w-full bg-black/60 border-2 border-white/10 rounded-[1rem] p-4 md:p-6 font-bold text-lg focus:border-pink-500 outline-none placeholder:text-slate-700 text-white" value={userName} onChange={e => setUserName(e.target.value)} />
                                    <input type="text" placeholder="Second Name" className="w-full bg-black/60 border-2 border-white/10 rounded-[1rem] p-4 md:p-6 font-bold text-lg focus:border-pink-500 outline-none placeholder:text-slate-700 text-white" value={partnerName} onChange={e => setPartnerName(e.target.value)} />
                                </div>
                                <button onClick={handleNameMatch} disabled={loading || !userName || !partnerName} className={`w-full py-5 md:py-7 bg-gradient-to-r from-pink-600 to-rose-700 rounded-[1.2rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all active:scale-95 shadow-2xl ${loading ? 'consulting...' : ''}`}>{loading ? 'Consulting the Seer...' : 'Check Vibe Match'}</button>
                                {loading && <LoadingOverlay />}
                                {errorMsg && <div className="mt-8 text-red-400 text-center p-6 glass-card rounded-2xl">{errorMsg}</div>}
                                {reading && !loading && <ResultCard title="Soul Resonance Analysis" text={reading} onRefresh={handleNameMatch} />}
                            </div>
                        )}

                        {view === 'advice' && (
                            <div className="max-w-3xl mx-auto text-center animate-in zoom-in-95 duration-500">
                                <h1 className="text-2xl md:text-5xl font-black mb-4 glow-text leading-tight">Daily Advice</h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] mb-10 tracking-widest px-4">A simple mystical guidance for today</p>
                                <button onClick={handleAdvice} className={`w-56 h-72 md:w-72 md:h-96 mx-auto rounded-[2.5rem] md:rounded-[4rem] border-4 border-dashed border-white/10 flex flex-col items-center justify-center gap-4 hover:border-yellow-400 transition-all active:scale-95 group glass-card ${loading ? 'searching-glow' : ''}`} disabled={loading}>
                                    <div className="p-4 md:p-6 bg-yellow-400/10 rounded-full group-hover:scale-125 transition-transform"><Icons.Sparkles /></div>
                                    <span className="font-black text-xs uppercase tracking-widest text-slate-300 px-4">{loading ? 'Searching...' : 'Pull Guidance'}</span>
                                </button>
                                {loading && <LoadingOverlay />}
                                {errorMsg && <div className="mt-8 text-red-400 text-center p-6 glass-card rounded-2xl">{errorMsg}</div>}
                                {reading && !loading && <ResultCard title="Daily Spiritual Path" text={reading} onRefresh={handleAdvice} />}
                            </div>
                        )}

                        {view === 'name_astrology' && (
                            <div className="max-w-3xl mx-auto animate-in fade-in duration-500">
                                <h1 className="text-2xl md:text-5xl font-black text-center mb-4 glow-text leading-tight text-balance">Know Your Future</h1>
                                <p className="text-center text-slate-400 font-bold uppercase text-[10px] mb-10 tracking-widest px-4 text-balance">Reveal your divine destiny path via name energy</p>
                                <div className="flex flex-col md:flex-row gap-3 relative group">
                                    <input type="text" placeholder="Full name here..." className="w-full bg-black/60 border-2 border-white/10 rounded-[1.2rem] p-5 md:p-7 md:pr-44 font-bold text-lg md:text-2xl focus:border-emerald-500 outline-none placeholder:text-slate-700 shadow-2xl text-white" value={userName} onChange={e => setUserName(e.target.value)} />
                                    <button onClick={handleNameAstrology} className={`md:absolute md:right-4 md:top-4 md:bottom-4 px-10 md:px-12 py-4 md:py-0 bg-emerald-500 text-black font-black rounded-xl md:rounded-3xl hover:bg-emerald-400 active:scale-95 text-base md:text-lg uppercase shadow-xl ${loading ? 'searching-glow opacity-50' : ''}`} disabled={loading}>{loading ? 'Searching...' : 'Reveal'}</button>
                                </div>
                                {loading && <LoadingOverlay />}
                                {errorMsg && <div className="mt-8 text-red-400 text-center p-6 glass-card rounded-2xl">{errorMsg}</div>}
                                {reading && !loading && <ResultCard title="Divine Destiny Insight" text={reading} onRefresh={handleNameAstrology} />}
                            </div>
                        )}
                    </main>

                    <footer className="py-16 text-center relative z-10 px-6">
                        <div className="w-16 md:w-24 h-0.5 bg-white/10 mx-auto mb-6" />
                        <p className="text-slate-500 text-[8px] md:text-[10px] font-black tracking-widest uppercase opacity-40 mb-3 text-balance">Celestial Labs 3D © 2025</p>
                        <p className="text-xs font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent uppercase tracking-widest">Designed by Sidhu</p>
                    </footer>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`p-2.5 md:p-3 md:px-6 rounded-xl text-[10px] md:text-sm flex items-center gap-1.5 transition-all font-black uppercase tracking-wider flex-shrink-0 btn-active ${active ? 'text-purple-400 bg-purple-400/10 shadow-[inset_0_0_10px_rgba(168,85,247,0.2)] border border-purple-400/20' : 'text-slate-500 hover:text-white'}`}>
                    <span className="flex-shrink-0 scale-90">{icon}</span>
                    <span className="hidden md:inline">{label}</span>
                </button>
            );
        }

        function SelectSign({ label, value, onChange }) {
            return (
                <div className="space-y-2">
                    <label className="text-[8px] md:text-[10px] font-black uppercase tracking-widest text-slate-500 pl-3">{label}</label>
                    <div className="relative">
                        <select className="w-full bg-black/60 text-white border-2 border-white/10 rounded-[1rem] p-4 md:p-5 font-bold text-base md:text-xl outline-none focus:border-indigo-500 transition-all cursor-pointer appearance-none" value={value || ""} onChange={e => onChange(e.target.value)}>
                            <option value="" disabled>Select sign...</option>
                            {ZODIAC_SIGNS.map(s => <option key={s.name} value={s.name} className="bg-[#050508]">{s.name}</option>)}
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg></div>
                    </div>
                </div>
            );
        }

        function ResultCard({ title, text, onRefresh }) {
            return (
                <div className="mt-8 md:mt-16 bg-black/80 p-6 md:p-14 rounded-[2rem] md:rounded-[4rem] border border-white/10 backdrop-blur-3xl shadow-3xl animate-in slide-in-from-bottom-8 duration-700 reveal-matter">
                    <h3 className="text-[10px] font-black uppercase text-purple-400 mb-6 tracking-widest border-b border-white/5 pb-4">{title}</h3>
                    <div className="text-sm md:text-xl leading-relaxed text-slate-100 whitespace-pre-wrap font-medium reveal-matter">{text}</div>
                    <div className="mt-8 flex flex-col sm:flex-row gap-3">
                        <button onClick={onRefresh} className="p-4 bg-white/5 rounded-xl hover:bg-purple-600 transition-all flex items-center justify-center btn-active text-white border border-white/10">
                            <Icons.RefreshCw />
                        </button>
                        <button className="flex-1 bg-white/5 text-white rounded-xl font-black text-[10px] uppercase tracking-widest py-4 transition-all border border-white/5 btn-active hover:bg-white/10">
                            Capture Insight
                        </button>
                    </div>
                </div>
            );
        }

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>

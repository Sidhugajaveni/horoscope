        function SpaceBackground() {
            const mountRef = useRef(null);
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                mountRef.current.appendChild(renderer.domElement);

                const starGeometry = new THREE.BufferGeometry();
                const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.8 });
                const starVertices = [];
                for (let i = 0; i < 12000; i++) {
                    starVertices.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, -Math.random() * 2000);
                }
                starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                const stars = new THREE.Points(starGeometry, starMaterial);
                scene.add(stars);

                camera.position.z = 1;
                let mouseX = 0, mouseY = 0;
                const handleMove = (e) => {
                    mouseX = (e.clientX - window.innerWidth / 2) / 100;
                    mouseY = (e.clientY - window.innerHeight / 2) / 100;
                };
                window.addEventListener('mousemove', handleMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    stars.rotation.y += 0.0003;
                    camera.position.x += (mouseX - camera.position.x) * 0.05;
                    camera.position.y += (-mouseY - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('resize', handleResize);
                    if (mountRef.current) mountRef.current.innerHTML = "";
                };
            }, []);
            return <div ref={mountRef} className="fixed inset-0 z-0 pointer-events-none" />;
        }

                            <div className="max-w-3xl mx-auto animate-in fade-in duration-500">
                                <h1 className="text-5xl font-black text-center mb-6 tracking-tight glow-text">Know Your Future</h1>
                                <p className="text-center text-slate-400 font-bold uppercase text-xs tracking-[0.2em] mb-16">Enter your name to see your destiny</p>
                                <div className="relative group">
                                    <input type="text" placeholder="Type your full name here..." className="w-full bg-black/60 border-2 border-white/10 rounded-[2.5rem] p-7 pr-44 font-bold text-2xl focus:border-emerald-500 outline-none transition-all placeholder:text-slate-700 shadow-2xl" value={userName} onChange={e => setUserName(e.target.value)} />
                                    <button onClick={handleNameAstrology} className={`absolute right-4 top-4 bottom-4 px-12 bg-emerald-500 text-black font-black rounded-3xl hover:bg-emerald-400 transition-all active:scale-95 text-lg uppercase tracking-widest shadow-xl ${loading ? 'searching-glow opacity-50' : ''}`} disabled={loading}>
                                        {loading ? 'Searching...' : 'Reveal'}
                                    </button>
                                </div>
                                {loading && <LoadingOverlay />}
                                {reading && !loading && <ResultCard title="Destiny Path Insight" text={reading} />}
                            </div>
                        )}
                    </main>

                    <footer className="py-24 text-center relative z-10 px-6">
                        <div className="w-24 h-1 bg-gradient-to-r from-transparent via-white/10 to-transparent mx-auto mb-10" />
                        <p className="text-slate-500 text-[10px] font-black tracking-[1em] uppercase opacity-40 mb-4 text-balance">Celestial Labs 3D © 2025</p>
                        <p className="text-sm font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent uppercase tracking-widest">Designed by Sidhu</p>
                    </footer>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`p-3 px-4 sm:px-6 rounded-2xl text-xs sm:text-sm flex items-center gap-2 transition-all font-black uppercase tracking-widest flex-shrink-0 ${active ? 'text-purple-400 bg-purple-400/10 shadow-[inset_0_0_10px_rgba(168,85,247,0.2)] border border-purple-400/20' : 'text-slate-500 hover:text-white'}`}>
                    {icon} <span className="hidden md:inline">{label}</span>
                </button>
            );
        }

        function SelectSign({ label, value, onChange }) {
            return (
                <div className="space-y-4">
                    <label className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 pl-4">{label}</label>
                    <select className="w-full bg-black/60 text-white border-2 border-white/10 rounded-[2rem] p-6 font-bold text-xl outline-none focus:border-indigo-500 transition-all cursor-pointer" value={value || ""} onChange={e => onChange(e.target.value)}>
                        <option value="" disabled>Select sign...</option>
                        {ZODIAC_SIGNS.map(s => <option key={s.name} value={s.name} className="bg-[#050508]">{s.name}</option>)}
                    </select>
                </div>
            );
        }

        function ResultCard({ title, text }) {
            return (
                <div className="mt-16 bg-black/80 p-10 md:p-16 rounded-[4rem] border-2 border-white/5 backdrop-blur-3xl shadow-3xl animate-in slide-in-from-bottom-12 duration-1000">
                    <h3 className="text-xs font-black uppercase text-purple-400 mb-10 tracking-[0.5em] border-b border-white/5 pb-8">{title}</h3>
                    <div className="text-xl leading-relaxed text-slate-100 whitespace-pre-wrap font-medium">{text}</div>
                    <div className="mt-16 flex flex-col sm:flex-row gap-4">
                        <button onClick={() => window.location.reload()} className="p-6 bg-white/5 rounded-3xl hover:bg-purple-600 transition-all flex items-center justify-center"><Icons.RefreshCw /></button>
                        <button className="flex-1 bg-white/5 rounded-3xl font-black text-xs uppercase tracking-[0.3em] hover:bg-white/10 py-6 transition-all border border-white/5">Store Insight</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
